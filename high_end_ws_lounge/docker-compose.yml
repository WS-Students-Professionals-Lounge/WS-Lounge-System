version: '3.8'
services:
  app:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ws_lounge_lapaz_pro
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data:

